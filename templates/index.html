<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>layers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"Geist Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
          colors: {
            ink:   '#f4f4f5',
            faint: '#d4d4d8',
            mute:  '#a1a1aa',
            line:  '#27272a',
            surf:  '#18181b',
            base:  '#09090b',
            accent:'#fafafa',
          },
        },
      },
    };
  </script>
  <style>
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    input, select { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-variant-numeric: tabular-nums; }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { appearance: textfield; }
    *::-webkit-scrollbar { width: 6px; height: 6px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
    *::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    /* Slim checkbox style */
    input[type=checkbox] {
      -webkit-appearance: none;
      appearance: none;
      width: 14px; height: 14px; border-radius: 3px;
      border: 1px solid #3f3f46; background: #09090b;
      cursor: pointer; position: relative; top: 1px;
    }
    input[type=checkbox]:checked { background: #e4e4e7; border-color: #e4e4e7; }
    input[type=checkbox]:checked::after {
      content: ''; position: absolute; left: 4px; top: 1px;
      width: 4px; height: 8px; border: solid #09090b;
      border-width: 0 2px 2px 0; transform: rotate(45deg);
    }
  </style>
</head>
<body class="bg-base text-ink antialiased text-[14px] h-screen">
  <div class="h-full flex flex-col">
    <!-- Top bar -->
    <header class="px-4 py-2 border-b border-line flex items-center justify-between shrink-0">
      <div class="flex items-center gap-3">
        <span class="font-medium tracking-tight text-ink">layers</span>
        <span id="scene-name" class="text-mute text-[13px] font-mono"></span>
      </div>
      <div class="flex items-center gap-2">
        <span id="render-status" class="text-mute text-[12px] font-mono mr-2"></span>
        <button type="button" id="btn-reload" class="px-3 py-1 text-[13px] border border-line rounded hover:bg-surf text-faint hover:text-ink transition" title="re-read scene JSON from disk">reload</button>
        <button type="button" id="btn-save" class="px-3 py-1 text-[13px] border border-line rounded hover:bg-surf text-faint hover:text-ink transition">save scene</button>
        <button type="button" id="btn-save-img" class="px-3 py-1 text-[13px] border border-line rounded hover:bg-surf text-faint hover:text-ink transition" title="copy current render to a timestamped PNG (metadata embedded)">save image</button>
        <button type="button" id="btn-render" class="px-3 py-1 text-[13px] bg-surf border border-line rounded hover:border-faint text-ink transition">render (r)</button>
      </div>
    </header>

    <!-- 3 columns -->
    <main class="flex-1 grid grid-cols-[1fr,360px,360px] gap-3 p-3 overflow-hidden min-h-0">

      <!-- Left: render preview -->
      <section class="bg-surf border border-line rounded flex flex-col overflow-hidden min-h-0">
        <div class="px-3 py-2 border-b border-line text-[13px] text-faint">preview</div>
        <div id="preview-wrap" class="flex-1 flex items-center justify-center p-3 overflow-hidden min-h-0">
          <img id="preview-image" alt="" class="max-w-full max-h-full hidden" />
          <span id="preview-placeholder" class="text-mute text-[13px] font-mono">press render</span>
        </div>
      </section>

      <!-- Middle: layers -->
      <section class="bg-surf border border-line rounded flex flex-col overflow-hidden min-h-0">
        <div class="px-3 py-2 border-b border-line text-[13px] text-faint flex items-center justify-between">
          <span>layers</span>
          <div class="flex gap-1">
            <button type="button" data-add="base_splat"       class="px-2 py-0.5 text-[12px] border border-line rounded hover:bg-line text-mute hover:text-ink transition">+ splat</button>
            <button type="button" data-add="surface_walks"    class="px-2 py-0.5 text-[12px] border border-line rounded hover:bg-line text-mute hover:text-ink transition">+ walks</button>
            <button type="button" data-add="generative_curve" class="px-2 py-0.5 text-[12px] border border-line rounded hover:bg-line text-mute hover:text-ink transition">+ curve</button>
          </div>
        </div>
        <div id="layers-list" class="flex-1 overflow-y-auto p-2 space-y-2 min-h-0"></div>
      </section>

      <!-- Right: bbox (with camera below) + log -->
      <section class="flex flex-col gap-3 overflow-hidden min-h-0">
        <!-- Bbox wireframe -->
        <div class="bg-surf border border-line rounded flex flex-col">
          <div class="px-3 py-2 border-b border-line text-[13px] text-faint flex items-center justify-between">
            <span>bbox</span>
            <span id="bbox-info" class="text-mute text-[12px] font-mono"></span>
          </div>
          <div id="bbox-wrap" class="relative h-80">
            <canvas id="bbox-canvas" class="block w-full h-full"></canvas>
          </div>
          <!-- Camera -->
          <div class="border-t border-line p-3">
            <div class="grid grid-cols-2 gap-x-3 gap-y-2">
              <div class="flex items-center justify-between gap-2">
                <label for="cam-elev" class="text-mute text-[13px]">elev</label>
                <input id="cam-elev" type="number" step="1" title="elevation (degrees)" class="w-16 bg-base border border-line rounded px-2 py-1 text-right text-[14px] focus:outline-none focus:border-faint" />
              </div>
              <div class="flex items-center justify-between gap-2">
                <label for="cam-azim" class="text-mute text-[13px]">azim</label>
                <input id="cam-azim" type="number" step="1" title="azimuth (degrees)" class="w-16 bg-base border border-line rounded px-2 py-1 text-right text-[14px] focus:outline-none focus:border-faint" />
              </div>
              <div class="flex items-center justify-between gap-2">
                <label for="cam-fov" class="text-mute text-[13px]">fov</label>
                <input id="cam-fov" type="number" step="1" title="field of view (degrees)" class="w-16 bg-base border border-line rounded px-2 py-1 text-right text-[14px] focus:outline-none focus:border-faint" />
              </div>
              <div class="flex items-center justify-between gap-2">
                <label for="cam-dist" class="text-mute text-[13px]">dist·k</label>
                <input id="cam-dist" type="number" step="0.05" title="distance multiplier" class="w-16 bg-base border border-line rounded px-2 py-1 text-right text-[14px] focus:outline-none focus:border-faint" />
              </div>
              <div class="flex items-center justify-between gap-2">
                <label for="cam-bias-x" class="text-mute text-[13px]">bias x</label>
                <input id="cam-bias-x" type="number" step="0.01" title="head bias x" class="w-16 bg-base border border-line rounded px-2 py-1 text-right text-[14px] focus:outline-none focus:border-faint" />
              </div>
              <div class="flex items-center justify-between gap-2">
                <label for="cam-bias-y" class="text-mute text-[13px]">bias y</label>
                <input id="cam-bias-y" type="number" step="0.01" title="head bias y" class="w-16 bg-base border border-line rounded px-2 py-1 text-right text-[14px] focus:outline-none focus:border-faint" />
              </div>
            </div>
            <div class="text-[11px] text-mute pt-2">drag bbox to orbit · scroll to zoom · release commits to render</div>
          </div>
        </div>

        <!-- Log -->
        <div class="bg-surf border border-line rounded flex flex-col flex-1 min-h-0">
          <div class="px-3 py-2 border-b border-line text-[13px] text-faint">log</div>
          <pre id="log" class="flex-1 overflow-y-auto p-3 text-[12px] text-mute font-mono leading-relaxed whitespace-pre-wrap"></pre>
        </div>
      </section>

    </main>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
